<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { background: #3B1F0E; color: #F2E8D9; font-family: 'Raleway', sans-serif; }
  .logo { display: inline-flex; align-items: center; gap: 10px; }
  .logo-icon { width: 60px; height: 60px; }
  .logo-text-col { display: flex; flex-direction: column; }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; letter-spacing: 1px; }
  .logo-subtitle { font-size: 8px; letter-spacing: 3px; display: flex; align-items: center; gap: 6px; color: #C4995A; }
  .logo-subtitle::before, .logo-subtitle::after { content: ''; flex: 1; height: 1px; background: #C4995A; opacity: 0.5; }
</style>
</head>
<body>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Arc -->
      <path d="M 45,15 A 35,35 0 0,1 80,50 A 35,35 0 0,1 60,78" fill="none" stroke="#C4995A" stroke-width="3" stroke-linecap="round"/>
      <!-- Head -->
      <circle cx="40" cy="35" r="5" fill="#F2E8D9"/>
      <!-- Body/Chair -->
      <path d="M 32,45 C 32,60 40,65 52,65 C 65,65 75,70 75,80 L 30,80 C 25,80 20,70 25,60 C 28,50 35,45 32,45 Z" fill="#F2E8D9"/>
      <!-- Waves -->
      <path d="M 55,48 Q 60,45 65,48 T 75,48" fill="none" stroke="#C4995A" stroke-width="2"/>
      <path d="M 58,55 Q 63,52 68,55 T 78,55" fill="none" stroke="#C4995A" stroke-width="2"/>
    </svg>
    <div class="logo-text-col">
      <div class="logo-title">DIVINE TOUCH</div>
      <div class="logo-subtitle">MASSAGE CHAIR</div>
    </div>
  </div>
</body>
</html>
